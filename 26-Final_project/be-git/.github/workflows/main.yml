name: Build and deploy

on:
  push:
    branches:
      - r_d_final_project_prod

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: trainings-tracker/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump version
        id: semver
        run: |
          NEW_VERSION=$(python scripts/semver.py)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Commit and tag new version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "ci: bump version to v${{ steps.semver.outputs.version }}"
          git tag "v${{ steps.semver.outputs.version }}"
          git push origin r_d_final_project_prod --tags

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: 'false'

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'false'

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          docker build ./backend \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'false'

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ env.ECR_REPOSITORY }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALB_DNS: ${{ secrets.ALB_DNS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPO,VERSION,DB_HOST,DB_USER,DB_PASSWORD,JWT_SECRET,ALB_DNS
          script: |
            IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${VERSION}"
            echo "Image: $IMAGE"
            
            aws ecr get-login-password --region eu-north-1 | \
              docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            
            docker pull "${IMAGE}"
            
            docker stop trainings-tracker-api || true
            docker rm trainings-tracker-api || true
            
            docker run -d \
              --name trainings-tracker-api \
              --restart unless-stopped \
              -p 3000:3000 \
              -v trainings_uploads:/app/uploads \
              -e DB_HOST="${DB_HOST}" \
              -e DB_PORT=3306 \
              -e DB_USER="${DB_USER}" \
              -e DB_PASSWORD="${DB_PASSWORD}" \
              -e DB_NAME=trainings_tracker \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e "API_BASE_URL=http://${ALB_DNS}" \
              "${IMAGE}"
            
            sleep 5
            docker ps | grep trainings-tracker-api

      - name: Print app URL
        env:
          ALB_DNS: ${{ secrets.ALB_DNS }}
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "Version: v${{ needs.build-and-push.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "App: http://$ALB_DNS/api/health" >> $GITHUB_STEP_SUMMARY