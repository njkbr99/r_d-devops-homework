---
plugin: amazon.aws.aws_ec2
regions:
  - eu-north-1
filters:
  tag:Project:
    - trainings-tracker
keyed_groups:
  - key: tags.Name
    prefix: tag
    separator: "_"
hostnames:
  - ip-address
compose:
  ansible_ssh_private_key_file: "'~/.ssh/anat-trainings-tracker-key.pem'"
  ansible_user: "'ubuntu' if tags.Name == 'trainings-tracker-monitoring' else 'ec2-user'"
