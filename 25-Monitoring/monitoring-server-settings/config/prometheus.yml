global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx-node'
    static_configs:
      - targets: ['10.0.1.81:9100']

  - job_name: 'mysql-node'
    static_configs:
      - targets: ['10.0.1.166:9100']

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['10.0.1.81:9113']

  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['10.0.1.166:9104']
